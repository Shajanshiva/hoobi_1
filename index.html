<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hoobi's Lucky Charm ❤️</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body>

    <div class="floating-elements" id="bgItems"></div>

    <!-- Screen 1: Passcode -->
    <div id="screen1" class="screen">
        <div class="passcode-container">
            <h2 style="margin-bottom: 20px;">Enter Passcode</h2>
            <div class="passcode-display">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
            <div class="numpad">
                <button class="num-btn" onclick="press(1)">1</button>
                <button class="num-btn" onclick="press(2)">2</button>
                <button class="num-btn" onclick="press(3)">3</button>
                <button class="num-btn" onclick="press(4)">4</button>
                <button class="num-btn" onclick="press(5)">5</button>
                <button class="num-btn" onclick="press(6)">6</button>
                <button class="num-btn" onclick="press(7)">7</button>
                <button class="num-btn" onclick="press(8)">8</button>
                <button class="num-btn" onclick="press(9)">9</button>
                <button class="num-btn" onclick="clearCode()">C</button>
                <button class="num-btn" onclick="press(0)">0</button>
                <button class="num-btn" onclick="checkCode()">OK</button>
            </div>
        </div>
    </div>

    <!-- Screen 2: Surprise -->
    <div id="screen2" class="screen hidden">
        <h1>Are you ready for your surprise, Hoobi? 🖤</h1>
        <div class="btn-group">
            <button class="btn btn-yes" onclick="nextScreen(3)">YES</button>
            <button id="noBtn" class="btn btn-no" onmouseover="moveNo()">NO</button>
        </div>
    </div>

    <!-- Screen 3: Gift Reveal -->
    <div id="screen3" class="screen hidden">
        <h1 style="margin-bottom: 40px;">Choose a Gift 🎁</h1>
        <div class="gifts-container">
            <div class="gift-box" onclick="revealGift(0)">
                <img src="https://cdn-icons-png.flaticon.com/512/214/214305.png" class="gift-img">
            </div>
            <div class="gift-box" onclick="revealGift(1)">
                <img src="https://cdn-icons-png.flaticon.com/512/214/214305.png" class="gift-img">
            </div>
            <div class="gift-box" onclick="revealGift(2)">
                <img src="https://cdn-icons-png.flaticon.com/512/214/214305.png" class="gift-img">
            </div>
        </div>
        <div id="giftReveal" style="margin-top: 30px;"></div>
        <button class="btn btn-yes hidden" id="nextToGallery" style="margin-top: 30px;" onclick="nextScreen(5)">More Memories ✨</button>
    </div>

    <!-- Screen 5: Photo Gallery -->
    <div id="screen5" class="screen hidden" style="overflow-y: auto; padding: 2rem 0;">
        <h1 style="margin-bottom: 30px;">Our Moments ❤️</h1>
        <div class="gallery-container" id="mainGallery">
            <!-- Remaining photos will be injected here -->
        </div>
        <button class="btn btn-yes" style="margin-top: 40px; margin-bottom: 40px;" onclick="nextScreen(4)">Read My Letter ✉️</button>
    </div>

    <!-- Screen 4: Letter -->
    <div id="screen4" class="screen hidden">
        <div class="letter-container">
            <div class="lucky-charm">🍀</div>
            <div class="letter-text" id="typedText"></div>
        </div>
    </div>

    <script>
        let currentCode = "";
        const correctCode = "8725"; // Default passcode
        const photos = [
            "photos/WhatsApp Image 2026-04-20 at 12.11.40 AM.jpeg",
            "photos/WhatsApp Image 2026-04-20 at 12.11.41 AM.jpeg",
            "photos/WhatsApp Image 2026-04-20 at 12.11.41 AM (1).jpeg",
            "photos/WhatsApp Image 2026-04-20 at 12.11.41 AM (2).jpeg",
            "photos/WhatsApp Image 2026-04-20 at 12.11.42 AM.jpeg",
            "photos/WhatsApp Image 2026-04-20 at 12.11.42 AM (1).jpeg",
            "photos/WhatsApp Image 2026-04-20 at 12.11.42 AM (2).jpeg",
            "photos/WhatsApp Image 2026-04-20 at 12.11.43 AM.jpeg",
            "photos/WhatsApp Image 2026-04-20 at 12.11.43 AM (1).jpeg",
            "photos/WhatsApp Image 2026-04-20 at 12.11.40 AM (1).jpeg"
        ];

        const letterText = `My lucky charm ❤️

Sometimes I sit quietly and think about us. About all the fights we had, the misunderstandings, the tears, and the moments where things felt really hard. But the one thing that always amazes me is that no matter how broken the moment felt, we never walked away from each other.

Many people leave when things become difficult. But we didn’t. We stayed. We fought, we cried, we got angry… but at the end of the day our hearts always found their way back to each other.

You are not just someone I love. You are the person who became a part of my life, my thoughts, and my heart without me even realizing it. When something good happens, I want to tell you first. When something hurts me, you are the only person I want beside me.

You are my peace in chaos, my smile in sadness, and truly my lucky charm.

Maybe we are not perfect. Maybe our story has fights and scars. But to me, that makes our love even more real. Because despite everything, we are still here… still choosing each other every single day.

And I want you to know one thing very clearly — no matter how hard life becomes, no matter how many storms come, I will never leave you.

Till my last breath, till the last day of my life… I will still be here loving you, choosing you, and standing beside you.

Because a life without you in it is not a life I want.

I love you, Hoobi. Forever. ❤️

🍀 🖤 💜 🐼`;

        function press(num) {
            if (currentCode.length < 4) {
                currentCode += num;
                updateDots();
            }
        }

        function clearCode() {
            currentCode = "";
            updateDots();
        }

        function updateDots() {
            const dots = document.querySelectorAll('.dot');
            dots.forEach((dot, i) => {
                if (i < currentCode.length) dot.classList.add('active');
                else dot.classList.remove('active');
            });
        }

        function checkCode() {
            if (currentCode === correctCode) {
                nextScreen(2);
            } else {
                alert("Incorrect passcode! let's try our first meeting date");
                clearCode();
            }
        }

        function nextScreen(num) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById('screen' + num).classList.remove('hidden');
            if (num === 4) typeWriter();
        }

        function moveNo() {
            const btn = document.getElementById('noBtn');
            const x = Math.random() * (window.innerWidth - btn.offsetWidth);
            const y = Math.random() * (window.innerHeight - btn.offsetHeight);
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }

        let revealedCount = 0;
        function revealGift(index) {
            const container = document.getElementById('giftReveal');
            container.innerHTML = `<img src="${photos[index + 1]}" class="revealed-photo">`;
            revealedCount++;
            if (revealedCount >= 1) {
                document.getElementById('nextToGallery').classList.remove('hidden');
            }
        }

        // Inject remaining photos into gallery
        const gallery = document.getElementById('mainGallery');
        const galleryPhotos = [photos[0], photos[4], photos[5], photos[6], photos[7], photos[8], photos[9]];
        galleryPhotos.forEach(src => {
            const img = document.createElement('img');
            img.src = src;
            img.className = 'gallery-img';
            gallery.appendChild(img);
        });

        function typeWriter() {
            const typedText = document.getElementById('typedText');
            let i = 0;
            function type() {
                if (i < letterText.length) {
                    typedText.innerHTML += letterText.charAt(i);
                    i++;
                    setTimeout(type, 50);
                    document.getElementById('screen4').scrollTop = document.getElementById('screen4').scrollHeight;
                }
            }
            type();
        }

        // Background floaters
        const bg = document.getElementById('bgItems');
        const items = [ '💜','🍀', '🖤' ];
        for (let i = 0; i < 20; i++) {
            const div = document.createElement('div');
            div.className = 'floating-item';
            div.innerHTML = items[Math.floor(Math.random() * items.length)];
            div.style.left = Math.random() * 100 + 'vw';
            div.style.top = Math.random() * 100 + 'vh';
            div.style.fontSize = Math.random() * 20 + 20 + 'px';
            div.style.animationDelay = Math.random() * 10 + 's';
            bg.appendChild(div);
        }
    </script>
</body>
</html>
